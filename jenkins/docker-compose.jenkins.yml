version: '3.9'

# Run Jenkins locally for testing the pipeline
# Usage: docker-compose -f jenkins/docker-compose.jenkins.yml up -d

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"     # Jenkins UI
      - "50000:50000"   # Agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount Docker socket so Jenkins can build Docker images
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount docker binary
      - /usr/local/bin/docker:/usr/local/bin/docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs
    restart: unless-stopped
    networks:
      - jenkins-net

  # Jenkins agent with Docker + Helm + kubectl + ArgoCD CLI
  jenkins-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: jenkins-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=docker-agent
      - JENKINS_SECRET=${JENKINS_AGENT_SECRET:-changeme}
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    depends_on:
      - jenkins
    restart: unless-stopped
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net:
    driver: bridge
