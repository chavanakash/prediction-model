services:
  postgres:
    image: postgres:16-alpine
    container_name: prediction-db
    environment:
      POSTGRES_DB: prediction_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prediction-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prediction-backend
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: prediction_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prediction-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prediction-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - prediction-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  prediction-net:
    driver: bridge
