---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prediction-app.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prediction-app.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: backend
        release: {{ .Release.Name }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: {{ .Values.backend.env.PORT | quote }}
            - name: NODE_ENV
              value: {{ .Values.backend.env.NODE_ENV | quote }}
            - name: DB_HOST
              value: {{ include "prediction-app.fullname" . }}-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.postgres.env.POSTGRES_DB | quote }}
            - name: DB_USER
              value: {{ .Values.postgres.env.POSTGRES_USER | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.passwordSecret }}
                  key: DB_PASSWORD
            - name: CORS_ORIGIN
              value: "*"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prediction-app.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prediction-app.labels" . | nindent 4 }}
    app: backend
spec:
  selector:
    app: backend
    release: {{ .Release.Name }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 5000
  type: {{ .Values.backend.service.type }}
