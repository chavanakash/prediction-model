replicaCount: 1

backend:
  image:
    repository: dockerizzz/prediction-backend
    tag: "14"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    PORT: "5000"
    NODE_ENV: "production"

frontend:
  image:
    repository: dockerizzz/prediction-frontend
    tag: "14"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "14"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  storage:
    size: 5Gi
    storageClass: ""
  env:
    POSTGRES_DB: prediction_db
    POSTGRES_USER: postgres
  existingSecret: ""
  passwordSecret: prediction-db-secret
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  host: prediction.local
  tls: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
